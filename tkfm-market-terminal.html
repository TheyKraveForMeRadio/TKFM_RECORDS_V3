<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>TKFM Market Terminal</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
background:#020617;
color:#e5e7eb;
font-family:system-ui;
margin:0;
padding:40px;
}

h1{
color:#facc15;
}

.panel{
background:#0f172a;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

.row{
display:flex;
justify-content:space-between;
padding:6px 0;
}

.bid{
color:#22c55e;
}

.ask{
color:#ef4444;
}

</style>

</head>

<body>

<h1>TKFM Order Book</h1>

<div class="panel">

<h3>Bids</h3>
<div id="bids"></div>

</div>

<div class="panel">

<h3>Asks</h3>
<div id="asks"></div>

</div>

<script>

/* ORDER BOOK DEPTH VIEW */

async function loadDepth(id){

try{

const res = await fetch("/.netlify/functions/orderbook-view?catalog_id="+id)
const book = await res.json()

const bids = document.getElementById("bids")
const asks = document.getElementById("asks")

bids.innerHTML=""
asks.innerHTML=""

(book.bids || []).slice(0,10).forEach(o=>{

const row=document.createElement("div")
row.className="row bid"
row.innerText=o.price+" ("+o.shares+")"
bids.appendChild(row)

})

(book.asks || []).slice(0,10).forEach(o=>{

const row=document.createElement("div")
row.className="row ask"
row.innerText=o.price+" ("+o.shares+")"
asks.appendChild(row)

})

}catch(e){

console.log("depth error",e)

}

}

/* AUTO REFRESH DEPTH */

setInterval(()=>loadDepth("song123"),3000)

/* INITIAL LOAD */

loadDepth("song123")

</script>

</body>
</html>
