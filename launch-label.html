<!DOCTYPE html>
<html>

<head>
<title>Launch Your Label</title>
</head>

<body>

<h1>Launch Your Own Record Label</h1>

<input id="name" placeholder="Label Name">

<button onclick="create()">Launch Label</button>

<script>

async function create(){

 const name = document.getElementById("name").value

 await fetch("/.netlify/functions/create-label",{
  method:"POST",
  body:JSON.stringify({
   name:name,
   owner_email:"owner@label.com"
  })
 })

 alert("Label created")

}

</script>

</body>
</html>
