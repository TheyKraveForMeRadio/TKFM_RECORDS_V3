<!DOCTYPE html>
<html>

<body style="background:#020617;color:white;font-family:system-ui;padding:30px">

<h1>Music Catalog Index</h1>

<pre id="index"></pre>

<script>

async function load(){

 const res =
 await fetch(
 '/.netlify/functions/catalog-index-builder'
 );

 const data =
 await res.json();

 document.getElementById("index")
 .textContent =
 JSON.stringify(data,null,2);

}

load();

</script>

</body>
</html>
