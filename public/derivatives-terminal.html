<!DOCTYPE html>
<html>

<body style="background:#020617;color:white;font-family:system-ui;padding:30px">

<h1>Music Derivatives Exchange</h1>

<pre id="orderbook"></pre>

<script>

async function load(){

 const res =
 await fetch(
 '/.netlify/functions/api/derivatives-orderbook'
 );

 const data =
 await res.json();

 document.getElementById("orderbook")
 .textContent =
 JSON.stringify(data,null,2);

}

load();

</script>

</body>
</html>
