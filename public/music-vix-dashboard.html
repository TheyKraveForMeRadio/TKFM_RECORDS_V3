<!DOCTYPE html>
<html>

<body style="background:#020617;color:white;font-family:system-ui;padding:30px">

<h1>MUSIC-VIX Volatility Index</h1>

<pre id="vix"></pre>

<script>

async function load(){

 const res =
 await fetch(
 '/.netlify/functions/api/music-vix-engine'
 );

 const data =
 await res.json();

 document.getElementById("vix")
 .textContent =
 JSON.stringify(data,null,2);

}

load();

</script>

</body>
</html>
