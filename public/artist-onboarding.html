<!DOCTYPE html>
<html>

<body style="background:#020617;color:white;font-family:system-ui;padding:30px">

<h1>Artist Onboarding</h1>

<input id="name" placeholder="Artist Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="wallet" placeholder="Wallet"><br><br>

<button onclick="submit()">Submit</button>

<script>

async function submit(){

 await fetch(
 '/.netlify/functions/artist-onboarding',
 {
  method:"POST",
  body:JSON.stringify({

   name:document.getElementById("name").value,
   email:document.getElementById("email").value,
   wallet:document.getElementById("wallet").value

  })
 });

 alert("Artist submitted");

}

</script>

</body>
</html>
