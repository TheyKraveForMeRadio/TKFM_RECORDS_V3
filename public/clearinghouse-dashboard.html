<!DOCTYPE html>
<html>

<body style="background:#020617;color:white;font-family:system-ui;padding:30px">

<h1>Music Asset Clearinghouse</h1>

<pre id="settlement"></pre>

<script>

async function load(){

 const res =
 await fetch(
 '/.netlify/functions/api/clearinghouse-settlement'
 );

 const data =
 await res.json();

 document.getElementById("settlement")
 .textContent =
 JSON.stringify(data,null,2);

}

load();

</script>

</body>
</html>
