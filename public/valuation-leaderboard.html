<!DOCTYPE html>
<html>

<body style="background:#020617;color:white;font-family:system-ui;padding:30px">

<h1>Catalog Valuation Leaderboard</h1>

<pre id="leaderboard"></pre>

<script>

async function load(){

 const res =
 await fetch(
 '/.netlify/functions/valuation-leaderboard'
 );

 const data =
 await res.json();

 document.getElementById("leaderboard")
 .textContent =
 JSON.stringify(data,null,2);

}

load()

</script>

</body>
</html>
