<!DOCTYPE html>
<html>

<body style="background:#020617;color:white;font-family:system-ui;padding:30px">

<h1>Worldwide Royalty Settlement Network</h1>

<pre id="network"></pre>

<script>

async function load(){

 const res =
 await fetch(
 '/.netlify/functions/api/global-royalty-network'
 );

 const data =
 await res.json();

 document.getElementById("network")
 .textContent =
 JSON.stringify(data,null,2);

}

load();

</script>

</body>
</html>
