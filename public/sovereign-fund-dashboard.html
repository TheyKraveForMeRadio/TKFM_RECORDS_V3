<!DOCTYPE html>
<html>

<body style="background:#020617;color:white;font-family:system-ui;padding:30px">

<h1>Music Sovereign Wealth Funds</h1>

<pre id="funds"></pre>

<script>

async function load(){

 const res =
 await fetch(
 '/.netlify/functions/sovereign-fund-engine'
 );

 const data = await res.json();

 document.getElementById("funds")
 .textContent =
 JSON.stringify(data,null,2);

}

load();

</script>

</body>
</html>
