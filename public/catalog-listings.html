<!DOCTYPE html>
<html>
<head>

<title>Catalog Listings</title>

<style>
body{
background:#020617;
color:white;
font-family:system-ui;
padding:30px;
}

.catalog{
border:1px solid #22d3ee;
padding:20px;
margin-bottom:15px;
}

</style>

</head>

<body>

<h1>Music Catalog Marketplace</h1>

<div id="catalogs"></div>

<script>

async function loadCatalogs(){

 const res = await fetch(
  '/.netlify/functions/catalog-list'
 );

 const data = await res.json();

 const container = document.getElementById("catalogs");

 container.innerHTML = "";

 data.catalogs.forEach(c => {

  const div = document.createElement("div");

  div.className = "catalog";

  div.innerHTML = `

   <h3>${c.title}</h3>
   <p>Artist: ${c.artist}</p>
   <p>Monthly Revenue: $${c.monthly_revenue}</p>
   <a href="/catalog-detail.html?id=${c.id}">
   <button>View</button>
   </a>

  `;

  container.appendChild(div);

 });

}

loadCatalogs();

</script>

</body>
</html>
