<!DOCTYPE html>
<html>

<head>
<title>AI Catalog Valuation</title>
</head>

<body style="background:#020617;color:white;font-family:system-ui;padding:30px">

<h1>AI Catalog Valuation</h1>

<pre id="valuation"></pre>

<script>

async function load(){

 const res = await fetch(
 '/.netlify/functions/catalog-ai-valuation'
 );

 const data = await res.json();

 document.getElementById("valuation")
 .textContent =
 JSON.stringify(data,null,2);

}

load();

</script>

</body>
</html>
