<!DOCTYPE html>
<html>

<body style="background:#020617;color:white;font-family:system-ui;padding:30px">

<h1>Streaming Oracle</h1>

<pre id="oracle"></pre>

<script>

async function load(){

 const res = await fetch(
  '/.netlify/functions/api/streaming-oracle-aggregator'
 );

 const data = await res.json();

 document.getElementById("oracle")
 .textContent =
 JSON.stringify(data,null,2);

}

load();

</script>

</body>
</html>
