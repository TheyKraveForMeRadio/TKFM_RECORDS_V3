<!DOCTYPE html>
<html>
<head>
<title>TKFM Live Economy</title>

<style>

body{
background:#020617;
color:#e5e7eb;
font-family:Arial;
padding:40px;
}

h1{
color:#facc15;
}

.stat{
background:#0f172a;
padding:20px;
margin-top:20px;
border-radius:8px;
}

.value{
font-size:26px;
color:#22c55e;
}

</style>

</head>

<body>

<h1>LIVE MUSIC ECONOMY</h1>

<div class="stat">
Market Cap
<div id="marketCap" class="value">Loading...</div>
</div>

<div class="stat">
Catalog Count
<div id="catalogCount" class="value">Loading...</div>
</div>

<script>

const source = new EventSource("/.netlify/functions/tkfm-market-terminal-engine")

source.onmessage = function(event){

const data = JSON.parse(event.data)

document.getElementById("marketCap").innerText =
"$"+Number(data.market_cap).toLocaleString()

document.getElementById("catalogCount").innerText =
data.catalog_count

}

</script>

</body>
</html>
