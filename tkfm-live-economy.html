<div style="max-width:1000px;margin:auto;padding:40px 20px;text-align:center;">

<h2 style="color:#facc15;">Live Music Economy</h2>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:20px;">

<div style="background:#0f172a;padding:20px;border-radius:8px;">
<div style="font-size:14px;color:#94a3b8;">Invested Today</div>
<div id="invested" style="font-size:28px;color:#22d3ee;">$0</div>
</div>

<div style="background:#0f172a;padding:20px;border-radius:8px;">
<div style="font-size:14px;color:#94a3b8;">Songs Trading</div>
<div id="songs" style="font-size:28px;color:#22d3ee;">0</div>
</div>

<div style="background:#0f172a;padding:20px;border-radius:8px;">
<div style="font-size:14px;color:#94a3b8;">Fan Investors</div>
<div id="fans" style="font-size:28px;color:#22d3ee;">0</div>
</div>

</div>

</div>

<script>

async function loadEconomy(){

const res = await fetch("/.netlify/functions/music-economy-metrics")
const data = await res.json()

document.getElementById("invested").innerText="$"+data.invested
document.getElementById("songs").innerText=data.songs
document.getElementById("fans").innerText=data.fans

}

loadEconomy()
setInterval(loadEconomy,5000)

</script>
