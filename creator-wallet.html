<!DOCTYPE html>
<html>

<head>
<title>TKFM Creator Wallet</title>
</head>

<body>

<h1>TKFM Creator Wallet</h1>

<pre id="data"></pre>

<script>

async function load(){

 const res = await fetch("/.netlify/functions/creator-wallet-balance?creator_id=1")

 const data = await res.json()

 document.getElementById("data").innerText =
  JSON.stringify(data,null,2)

}

load()

</script>

</body>
</html>
