<!DOCTYPE html>
<html>
<head>

<title>TKFM Music Market TV</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:40px;
}

h1{
color:#facc15;
}

.feed{
margin-top:30px;
}

.event{
background:#0f172a;
padding:14px;
margin-bottom:10px;
border-radius:6px;
}

.time{
color:#22d3ee;
font-size:12px;
}

</style>

</head>

<body>

<h1>Music Market TV</h1>

<p>Live feed of the TKFM music economy</p>

<div id="feed" class="feed"></div>

<script>

async function loadFeed(){

const res = await fetch("/.netlify/functions/market-tv-feed")
const data = await res.json()

const feed=document.getElementById("feed")
feed.innerHTML=""

(data.events || []).forEach(e=>{

const div=document.createElement("div")
div.className="event"

div.innerHTML="<div>"+e.message+"</div>"+
"<div class='time'>"+e.time+"</div>"

feed.appendChild(div)

})

}

loadFeed()
setInterval(loadFeed,4000)

</script>

</body>
</html>
