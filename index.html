<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TKFM RECORDS — Label OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="They Krave For Me Records — Independent Artist Power Station" />

  <style>
    :root {
      --bg: #020617;
      --accent: #facc15;
      --accent-dark: #eab308;
      --orange: #f97316;
      --text: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .os {
      max-width: 960px;
      padding: 48px;
      text-align: center;
    }

    .logo {
      max-width: 180px;
      margin-bottom: 24px;
    }

    h1 {
      color: var(--accent);
      font-size: 2.6rem;
      margin-bottom: 12px;
      letter-spacing: 0.04em;
    }

    p {
      color: #cbd5f5;
      margin-bottom: 36px;
      font-size: 1.1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    a {
      text-decoration: none;
    }

    .card {
      border: 1px solid var(--accent-dark);
      padding: 20px;
      border-radius: 10px;
      background: rgba(250, 204, 21, 0.04);
      color: var(--accent);
      font-weight: 600;
      transition: all 0.15s ease;
    }

    .card:hover {
      background: rgba(250, 204, 21, 0.12);
      transform: translateY(-2px);
    }

    footer {
      margin-top: 48px;
      font-size: 0.85rem;
      color: #64748b;
    }
  </style>

  <script>
    window.TKFM_SITE_MODE = "{{TKFM_SITE_MODE}}";
  </script>
  <script src="/tkfm-os-router.js"></script>
</head>
<body>
  <div class="os">
    <img src="/tkfm-records-logo.png" alt="TKFM Records" class="logo" />

    <h1>TKFM</h1>
    <p>Independent Artist Power Station · Label OS</p>

    <div class="grid">
      <a href="/label-home.html"><div class="card">Label Home</div></a>
      <a href="/label-hub.html"><div class="card">Label Hub</div></a>
      <a href="/artist-dashboard.html"><div class="card">Artist Dashboard</div></a>
      <a href="/owner-dashboard.html"><div class="card">Owner Dashboard</div></a>
      <a href="/tkfm-sponsor-read-engine.html"><div class="card">Sponsor Engine</div></a>
      <a href="/tkfm-mixtape-spotlight.html"><div class="card">Mixtape Spotlight</div></a>
    </div>

    <footer>
      © TKFM · DJ KRAVE · OS ACTIVE
    </footer>
  </div>
</body>
</html>
