<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<title>TKFM — Music Market Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>

<style>

:root{
--bg:#020617;
--gold:#facc15;
--text:#e5e7eb;
--panel:#0f172a;
--green:#22c55e;
--red:#ef4444;
--blue:#22d3ee;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:system-ui;
}

header{
padding:20px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
height:40px;
}

.marketcap{
color:var(--gold);
font-weight:bold;
}

.ticker{
background:#000;
white-space:nowrap;
overflow:hidden;
padding:10px;
border-top:1px solid #111;
border-bottom:1px solid #111;
}

.ticker span{
padding:0 30px;
color:var(--blue);
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
padding:20px;
max-width:1200px;
margin:auto;
}

.panel{
background:var(--panel);
border-radius:8px;
padding:20px;
}

.section{
font-weight:bold;
color:var(--gold);
margin-bottom:10px;
}

.trade{
border-bottom:1px solid #1e293b;
padding:8px 0;
font-size:14px;
}

.heatmap{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
}

.tile{
padding:10px;
border-radius:4px;
text-align:center;
font-size:12px;
}

footer{
text-align:center;
padding:30px;
font-size:.8rem;
color:#64748b;
}

</style>

</head>

<body>

<header>

<img src="/tkfm-records-logo.png" class="logo">

<div class="marketcap">
Market Cap: <span id="marketcap">$0</span>
</div>

</header>

<div class="ticker" id="ticker"></div>

<div class="grid">

<div class="panel">

<div class="section">Market Chart</div>

<canvas id="priceChart" height="220"></canvas>

</div>

<div class="panel">

<div class="section">Live Trades</div>

<div id="trades"></div>

</div>

<div class="panel">

<div class="section">Trending Songs</div>

<div id="market"></div>

</div>

<div class="panel">

<div class="section">Market Heatmap</div>

<div class="heatmap" id="heatmap"></div>

</div>

</div>

<footer>
TKFM Music Economy · DJ KRAVE
</footer>

<script>

/* REAL TIME MARKET STREAM */

const source =
new EventSource("/.netlify/functions/tkfm-market-stream-engine")

source.onmessage = function(event){

const data = JSON.parse(event.data)

if(data.market_cap){

document.getElementById("marketcap").innerText =
"$"+Number(data.market_cap).toLocaleString()

}

if(data.recent_trades){

const container=document.getElementById("trades")

container.innerHTML=""

data.recent_trades.forEach(t=>{

const row=document.createElement("div")
row.className="trade"

row.innerText=
t.token_id+" "+t.quantity+" @ $"+t.price

container.appendChild(row)

})

}

}

/* LOAD MARKET DATA */

async function loadMarket(){

const res =
await fetch("/.netlify/functions/catalog-market-data")

const data = await res.json()

/* ticker */

const ticker=document.getElementById("ticker")
ticker.innerHTML=""

(data.market||[]).forEach(s=>{

const span=document.createElement("span")
span.innerText=s.catalog_id+" $"+s.price

ticker.appendChild(span)

})

/* trending */

const market=document.getElementById("market")
market.innerHTML=""

(data.market||[]).slice(0,6).forEach(s=>{

const row=document.createElement("div")

row.innerText=s.catalog_id+" — $"+s.price

market.appendChild(row)

})

/* heatmap */

const heat=document.getElementById("heatmap")
heat.innerHTML=""

(data.market||[]).slice(0,20).forEach(s=>{

const tile=document.createElement("div")
tile.className="tile"

tile.style.background =
Math.random()>.5
? "rgba(34,197,94,.3)"
: "rgba(239,68,68,.3)"

tile.innerText=s.catalog_id

heat.appendChild(tile)

})

}

loadMarket()

setInterval(loadMarket,5000)

/* PRICE CHART */

async function loadChart(){

const res =
await fetch("/.netlify/functions/chart-price-history?token_id=song123")

const data = await res.json()

const ctx =
document.getElementById("priceChart")

const chartData = data.candles.map(c=>({
x:new Date(c.t),
o:c.o,
h:c.h,
l:c.l,
c:c.c
}))

new Chart(ctx,{
type:"candlestick",
data:{
datasets:[{
label:"Song Price",
data:chartData
}]
}
})

}

loadChart()

setInterval(loadChart,10000)

</script>

</body>
</html>
