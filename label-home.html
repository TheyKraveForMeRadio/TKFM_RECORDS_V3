<!DOCTYPE html>
<html lang="en" data-tkfm-theme="records">
<head>
  <meta charset="UTF-8" />
  <title>TKFM Records — Artist Label Portal</title>

  <!-- TKFM Records Lane Lock -->
  <meta name="tkfm-lane" content="records-only" />

  <!-- Records Styles -->
  <link rel="stylesheet" href="/css/tkfm-records.css" />

  <!-- Records Autoload (injects FX + shell automatically) -->
  <script src="/js/tkfm-records-autoload.js" defer></script>

  <!-- Buy Credits Engine -->
  <script src="/js/tkfm-buy-credits.js" defer></script>

  <style>
    body {
      background:#020617;
      color:#facc15;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .label-wrap {
      max-width: 960px;
      margin: 80px auto;
      padding: 40px;
      border-radius: 16px;
      background: rgba(2,6,23,0.9);
      box-shadow: 0 0 60px rgba(250,204,21,0.25);
    }
    h1 {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }
    p {
      color:#eab308;
    }
    .credit-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(240px,1fr));
      gap: 20px;
      margin-top: 40px;
    }
    button {
      padding: 18px 22px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg,#facc15,#f97316);
      color:#020617;
      box-shadow: 0 0 25px rgba(250,204,21,0.45);
    }
    button:hover {
      transform: scale(1.03);
    }
  </style>
</head>

<body>

  <!-- Records FX Layers (AUTO USED BY tkfm-shell.js) -->
  <div class="tkfm-bg-main"></div>
  <div class="tkfm-bg-orbit"></div>

  <div class="label-wrap">
    <h1>TKFM Records — Artist Label Dashboard</h1>
    <p>Purchase AI services and label tools below. Credits apply instantly.</p>

    <div class="credit-buttons">
      <button onclick="TKFM_BUY_CREDITS.buyCredits('ai_drops_25')">
        Buy AI Drops (25)
      </button>

      <button onclick="TKFM_BUY_CREDITS.buyCredits('sponsor_read_20pack')">
        Buy Sponsor Reads (20)
      </button>
    </div>
  </div>

</body>
</html>
