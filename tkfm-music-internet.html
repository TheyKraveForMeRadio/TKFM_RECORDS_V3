<!DOCTYPE html>
<html>

<head>
<title>TKFM Global Music Internet</title>
</head>

<body>

<h1>TKFM Global Music Internet</h1>

<pre id="data"></pre>

<script>

async function load(){

 const res = await fetch(
  "/.netlify/functions/api/tkfm-internet-gateway"
 )

 const data = await res.json()

 document.getElementById("data").innerText =
  JSON.stringify(data,null,2)

}

load()

</script>

</body>
</html>
