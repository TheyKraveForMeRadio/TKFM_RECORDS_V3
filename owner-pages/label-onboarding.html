<script>
  (function() {
    const FORM_KEY = 'tkfm_labelOnboardingDraft';
    const form = document.getElementById('onboarding-form');
    const draftStatusEl = document.getElementById('draft-status');
    const clearBtn = document.getElementById('clear-draft');
    const toastEl = document.getElementById('toast');

    function showToast() {
      if (!toastEl) return;
      toastEl.style.display = 'block';
      setTimeout(() => { toastEl.style.display = 'none'; }, 2600);
    }

    function setDraftStatus(text) { if (draftStatusEl) draftStatusEl.textContent = text; }
    function loadDraft() { /* include exactly as provided in HTML */ }
    function validateForm() { /* include exactly as provided in HTML */ }
    function saveDraft() { /* include exactly as provided in HTML */ }

    if (form) {
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (!validateForm()) {
          setDraftStatus('Please fix required fields before saving the onboarding draft.');
          return;
        }
        saveDraft();
      });
    }

    if (clearBtn) {
      clearBtn.addEventListener('click', function() {
        try {
          localStorage.removeItem(FORM_KEY);
          setDraftStatus('Draft cleared. Fill out the form and hit Save onboarding data.');
        } catch (err) { console.error('Failed to clear onboarding draft', err); }
      });
    }

    loadDraft();
  })();
</script>
