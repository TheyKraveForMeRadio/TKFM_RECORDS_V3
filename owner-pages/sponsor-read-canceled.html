<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>TKFM Sponsor Read — Canceled</title>
  <style>
:root{
  --bg:#020617;
  --purple:#a855f7;
  --pink:#ec4899;
  --cyan:#22d3ee;
  --blue:#3b82f6;
  --gold:#facc15;
  --gold2:#eab308;
  --amber:#f97316;
  --panel: rgba(2,6,23,0.72);
  --panel2: rgba(2,6,23,0.50);
  --border: rgba(168,85,247,0.35);
  --text: rgba(255,255,255,0.92);
  --muted: rgba(255,255,255,0.70);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
  color:var(--text);
  background:
    radial-gradient(900px 450px at 10% 10%, rgba(168,85,247,0.25), transparent 55%),
    radial-gradient(900px 450px at 90% 20%, rgba(34,211,238,0.18), transparent 55%),
    radial-gradient(900px 450px at 70% 90%, rgba(236,72,153,0.16), transparent 55%),
    linear-gradient(180deg, #020617 0%, #020617 55%, #030a1c 100%);
}
a{color:inherit}
.wrap{max-width:1100px;margin:0 auto;padding:24px}
.topbar{
  position:sticky;top:0;z-index:50;
  background: rgba(2,6,23,0.78);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(34,211,238,0.18);
}
.topbar .inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;max-width:1100px;margin:0 auto
}
.brand{display:flex;align-items:center;gap:12px}
.brand img{width:46px;height:46px;object-fit:contain}
.card{
  background: linear-gradient(180deg, var(--panel) 0%, rgba(2,6,23,0.55) 100%);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 12px 40px rgba(0,0,0,0.35);
}
.card .pad{padding:22px}
.btn{
  border:1px solid rgba(168,85,247,0.42);
  background: linear-gradient(90deg, rgba(168,85,247,0.28), rgba(34,211,238,0.18));
  padding:10px 14px;border-radius:12px;
  font-weight:700;text-decoration:none;display:inline-block
}
.btn.gold{
  border-color: rgba(250,204,21,0.35);
  background: linear-gradient(90deg, rgba(250,204,21,0.18), rgba(243,115,22,0.14));
}
.btn.ghost{
  background: rgba(2,6,23,0.32);
}
</style>
</head>
<body>

<div class="topbar">
  <div class="inner">
    <div class="brand">
      <img src="/tkfm-radio-logo.png" onerror="this.src='/public/tkfm-radio-logo.png'">
      <div>
        <b>Checkout Canceled</b><br/>
        <span>No charge was completed</span>
      </div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="card">
    <div class="pad">
      <h1>Want to try again?</h1>
      <p>Your payment was canceled. No credits were charged.</p>
      <div style="margin-top:16px">
        <a class="btn gold" href="/owner-pages/tkfm-sponsor-read-engine.html">Back to Sponsor Read Engine</a>
        <a class="btn ghost" href="/pricing.html">Back to Pricing</a>
      </div>
    </div>
  </div>
</div>

<script src="/js/tkfm-owner-override.js"></script>
<script src="/js/tkfm-owner-nav.js"></script>

</body>
</html>
