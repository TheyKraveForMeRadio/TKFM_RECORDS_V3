        <div class="text-sm font-semibold">
          Label <span class="text-yellow-300">Revenue Console</span>
        </div>

    </a>
    <nav class="ml-auto flex flex-wrap gap-2 text-[0.7rem] uppercase tracking-[0.22em]">

<main class="flex-1 max-w-6xl mx-auto px-4 pt-8 pb-10">

    The money side of <span class="text-yellow-300">TKFM Records</span>
  </h1>

  <div id="lr-console"></div>
</main>

<footer class="border-t border-yellow-500/40 bg-black/50">
  <div class="max-w-6xl mx-auto px-4 py-4 text-[0.7rem] text-slate-300">
    © 2025 TKFM Records — Revenue Console
  </div>
</footer>

<script>
const PRICE_TABLE={Starter:500,Pro:1000,Elite:2500}

function getOrders(){
  try{return JSON.parse(localStorage.getItem('mixtapeOrders')||'[]')}catch{return[]}
}
function saveOrders(o){localStorage.setItem('mixtapeOrders',JSON.stringify(o))}
function money(n){return '$'+(Number(n)||0).toLocaleString()}

function render(){
  const orders=getOrders()
  document.getElementById('lr-console').innerHTML=
    '<pre>'+JSON.stringify(orders,null,2)+'</pre>'
}

document.addEventListener('DOMContentLoaded',render)

/* 🔥 STRIPE AUTO-REFRESH HOOK */
window.addEventListener('storage',e=>{
  if(e.key==='mixtapeOrders') render()
})
</script>

<script src="/js/owner-lock.js" data-owner-page="owner"></script>
<script src="/js/tkfm-owner-override.js"></script>
<script type="module" src="/js/tkfm-logo-resolver.js"></script>
