<!DOCTYPE html>
<html>

<head>
<title>TKFM Clearinghouse</title>
</head>

<body>

<h1>TKFM Global Clearinghouse</h1>

<pre id="data"></pre>

<script>

async function load(){

 const res = await fetch(
 "/.netlify/functions/clearinghouse-dashboard"
 );

 const data = await res.json();

 document.getElementById("data").innerText =
  JSON.stringify(data,null,2);

}

load();

setInterval(load,60000);

</script>

</body>
</html>
