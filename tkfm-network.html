<!DOCTYPE html>
<html>

<head>
<title>TKFM Global Music Network</title>
</head>

<body>

<h1>TKFM Global Music Network</h1>

<pre id="data"></pre>

<script>

async function load(){

 const res = await fetch(
  "/.netlify/functions/tkfm-network-api"
 );

 const data = await res.json();

 document.getElementById("data").innerText =
  JSON.stringify(data,null,2);

}

load();

</script>

</body>
</html>
