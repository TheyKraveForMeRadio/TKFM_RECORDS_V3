<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>My Royalties — TKFM Records</title>
<script src="/js/tkfm-royalty-engine.js"></script>
</head>

<body data-tkfm-theme="records">

<h2>My Royalties</h2>

<div id="balance"></div>
<hr>
<div id="rows"></div>

<script>
const email = document.querySelector('meta[name="artist-email"]')?.content;
if (!email) document.body.innerHTML = "Artist email missing.";

const list = TKFM_ROYALTIES.byArtist(email);
balance.innerHTML = `<b>Current Balance:</b> $${TKFM_ROYALTIES.balance(email).toFixed(2)}`;

list.forEach(r => {
  const d = document.createElement("div");
  d.innerHTML = `
    <b>${r.track}</b><br>
    Source: ${r.source}<br>
    Gross: $${r.gross.toFixed(2)}<br>
    Artist Earned: $${r.artistEarnings.toFixed(2)}<br>
    Paid: ${r.paid ? "YES" : "NO"}
    <hr>
  `;
  rows.appendChild(d);
});
</script>

</body>
</html>
