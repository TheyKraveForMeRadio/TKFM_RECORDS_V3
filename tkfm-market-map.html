<!DOCTYPE html>
<html>

<head>

<title>TKFM Market Map</title>

<style>

body{
background:#020617;
color:#e5e7eb;
font-family:Arial;
padding:40px;
}

h1{
color:#facc15;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
margin-top:40px;
}

.tile{

padding:20px;
border-radius:8px;
background:#0f172a;
}

.name{
font-weight:bold;
margin-bottom:10px;
}

.marketcap{
color:#22c55e;
}

.volume{
color:#3b82f6;
}

</style>

</head>

<body>

<h1>TKFM MUSIC MARKET HEATMAP</h1>

<div id="map" class="grid"></div>

<script>

async function loadHeatmap(){

const res=await fetch("/.netlify/functions/api/tkfm-market-map-engine")

const data=await res.json()

const map=document.getElementById("map")

map.innerHTML=""

for(const asset of data.assets){

const tile=document.createElement("div")

tile.className="tile"

tile.innerHTML=`
<div class="name">${asset.name}</div>
<div>Price: $${asset.price}</div>
<div class="marketcap">Market Cap: $${asset.market_cap.toLocaleString()}</div>
<div class="volume">Volume: $${asset.volume.toLocaleString()}</div>
`

map.appendChild(tile)

}

}

loadHeatmap()

</script>

</body>

</html>
