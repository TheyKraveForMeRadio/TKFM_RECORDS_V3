############################################
# TKFM GLOBAL BUILD CONFIG
############################################

[build]
publish = "."
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "22"
NODE_ENV = "production"
DEBUG_MODE = "false"

############################################
# FUNCTIONS CONFIG
############################################

[functions]
node_bundler = "esbuild"
external_node_modules = ["stripe","jsonwebtoken","bcryptjs","@supabase/supabase-js"]
included_files = ["netlify/functions/_middleware-secret-guard.js"]

############################################
# TKFM CENTRAL SCHEDULER
############################################

[[scheduled]]
path = "/.netlify/functions/tkfm-master-cron"
schedule = "*/1 * * * *"

############################################
# STRIPE WEBHOOK ROUTING
############################################

[[redirects]]
from = "/stripe-webhook"
to = "/.netlify/functions/stripe-webhook-ledger"
status = 200

############################################
# EDGE SECURITY
############################################

[[edge_functions]]
function = "lockdown"
path = "/admin/*"

[[edge_functions]]
function = "lockdown"
path = "/owner/*"

[[edge_functions]]
function = "lockdown"
path = "/secure/*"

[[edge_functions]]
function = "lockdown"
path = "/private/*"

[[edge_functions]]
function = "lockdown"
path = "/.netlify/*"
