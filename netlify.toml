############################################
# TKFM GLOBAL BUILD CONFIG
############################################

[build]
publish = "."
functions = "netlify/functions"

[functions]
node_bundler = "esbuild"

############################################
# MASTER ORCHESTRATION SCHEDULER
############################################

[[scheduled]]
path = "/.netlify/functions/tkfm-master-cron"
schedule = "*/5 * * * *"

############################################
# CRITICAL LOW-LATENCY ENGINES
############################################

[[scheduled]]
path = "/.netlify/functions/matching-engine"
schedule = "*/1 * * * *"

[[scheduled]]
path = "/.netlify/functions/market-maker-ai"
schedule = "*/2 * * * *"

[[scheduled]]
path = "/.netlify/functions/market-maker-orders"
schedule = "*/2 * * * *"

############################################
# STREAMING ORACLE SYSTEM
############################################

[[scheduled]]
path = "/.netlify/functions/spotify-royalty-sync"
schedule = "*/30 * * * *"

[[scheduled]]
path = "/.netlify/functions/streaming-revenue-oracle"
schedule = "0 * * * *"

[[scheduled]]
path = "/.netlify/functions/streaming-stats-ingest"
schedule = "*/10 * * * *"

[[scheduled]]
path = "/.netlify/functions/calculate-streaming-royalties"
schedule = "*/10 * * * *"

############################################
# STREAMING INGEST
############################################

[[scheduled]]
path = "/.netlify/functions/spotify-revenue-ingest"
schedule = "0 */4 * * *"

[[scheduled]]
path = "/.netlify/functions/youtube-revenue-ingest"
schedule = "0 */4 * * *"

############################################
# GLOBAL DISTRIBUTION ENGINE
############################################

[[scheduled]]
path = "/.netlify/functions/distribution-router"
schedule = "*/10 * * * *"

[[scheduled]]
path = "/.netlify/functions/deliver-to-platforms"
schedule = "*/10 * * * *"

############################################
# ROYALTY DISTRIBUTION
############################################

[[scheduled]]
path = "/.netlify/functions/royalty-distribution-engine"
schedule = "0 */4 * * *"

[[scheduled]]
path = "/.netlify/functions/distribute-royalties"
schedule = "0 0 1 * *"

############################################
# MUSIC INDEX + MARKET DATA
############################################

[[scheduled]]
path = "/.netlify/functions/music-index-engine"
schedule = "0 */2 * * *"

[[scheduled]]
path = "/.netlify/functions/trending-index-engine"
schedule = "0 */2 * * *"

[[scheduled]]
path = "/.netlify/functions/music-market-index"
schedule = "*/10 * * * *"

############################################
# PLATFORM GROWTH + ACTIVATION
############################################

[[scheduled]]
path = "/.netlify/functions/platform-growth-engine"
schedule = "*/10 * * * *"

[[scheduled]]
path = "/.netlify/functions/artist-recruitment-engine"
schedule = "*/10 * * * *"

[[scheduled]]
path = "/.netlify/functions/catalog-upload-engine"
schedule = "*/10 * * * *"

[[scheduled]]
path = "/.netlify/functions/music-economy-activation"
schedule = "*/10 * * * *"

############################################
# FAN INVESTMENT MARKET
############################################

[[scheduled]]
path = "/.netlify/functions/fan-invest-catalog"
schedule = "*/10 * * * *"

[[scheduled]]
path = "/.netlify/functions/buy-catalog-shares"
schedule = "*/10 * * * *"

############################################
# CATALOG EXCHANGE
############################################

[[scheduled]]
path = "/.netlify/functions/create-buy-order"
schedule = "*/5 * * * *"

[[scheduled]]
path = "/.netlify/functions/create-sell-order"
schedule = "*/5 * * * *"

[[scheduled]]
path = "/.netlify/functions/match-catalog-orders"
schedule = "*/2 * * * *"

############################################
# CATALOG PRICE ENGINE
############################################

[[scheduled]]
path = "/.netlify/functions/catalog-price-history"
schedule = "*/5 * * * *"

[[scheduled]]
path = "/.netlify/functions/record-catalog-price"
schedule = "*/5 * * * *"

[[scheduled]]
path = "/.netlify/functions/live-catalog-price"
schedule = "*/5 * * * *"

############################################
# GLOBAL RIGHTS CLEARINGHOUSE
############################################

[[scheduled]]
path = "/.netlify/functions/rights-registry"
schedule = "*/15 * * * *"

[[scheduled]]
path = "/.netlify/functions/performance-royalty-engine"
schedule = "*/10 * * * *"

[[scheduled]]
path = "/.netlify/functions/royalty-clearinghouse"
schedule = "*/10 * * * *"

############################################
# CREATOR WALLET SYSTEM
############################################

[[scheduled]]
path = "/.netlify/functions/create-creator-wallet"
schedule = "*/15 * * * *"

[[scheduled]]
path = "/.netlify/functions/creator-wallet-balance"
schedule = "*/10 * * * *"

[[scheduled]]
path = "/.netlify/functions/creator-wallet-transaction"
schedule = "*/5 * * * *"

############################################
# INVESTOR TERMINAL + EXECUTIVE METRICS
############################################

[[scheduled]]
path = "/.netlify/functions/investor-terminal"
schedule = "*/5 * * * *"

[[scheduled]]
path = "/.netlify/functions/executive-metrics"
schedule = "*/5 * * * *"

############################################
# TKFM OPERATING CONSOLE
############################################

[[scheduled]]
path = "/.netlify/functions/tkfm-operating-console"
schedule = "*/5 * * * *"

############################################
# STRIPE WEBHOOK ROUTING
############################################

[[redirects]]
from = "/stripe-webhook"
to = "/.netlify/functions/stripe-webhook-ledger"
status = 200

############################################
# EDGE SECURITY
############################################

[[edge_functions]]
function = "lockdown"
path = "/admin/*"

[[edge_functions]]
function = "lockdown"
path = "/owner/*"

[[edge_functions]]
function = "lockdown"
path = "/secure/*"

[[edge_functions]]
function = "lockdown"
path = "/private/*"

[[edge_functions]]
function = "lockdown"
path = "/.netlify/*"

############################################
# ENVIRONMENT
############################################

[build.environment]
NODE_ENV = "production"
DEBUG_MODE = "false"

