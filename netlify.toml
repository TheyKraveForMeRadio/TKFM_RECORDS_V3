############################################
# TKFM GLOBAL BUILD CONFIG
############################################

[build]
publish = "."
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "22"
NODE_ENV = "production"
DEBUG_MODE = "false"

############################################
# FUNCTIONS CONFIG (OPTIMIZED)
############################################

[functions]
node_bundler = "esbuild"

external_node_modules = [
"stripe",
"jsonwebtoken",
"bcryptjs",
"@supabase/supabase-js",
"ethers",
"ioredis",
"cloudinary",
"pdfkit",
"pdf-lib",
"resend",
"@aws-sdk/client-s3",
"@apollo/server"
]

included_files = [
"netlify/functions/_middleware-secret-guard.js"
]

############################################
# FUNCTION TIMEOUT
############################################

[functions.timeout]
seconds = 26

############################################
# TKFM CENTRAL SCHEDULER
############################################

[[scheduled]]
path = "/.netlify/functions/tkfm-master-cron"
schedule = "*/1 * * * *"

############################################
# STRIPE WEBHOOK ROUTING
############################################

[[redirects]]
from = "/stripe-webhook"
to = "/.netlify/functions/stripe-webhook-ledger"
status = 200
