<!DOCTYPE html>
<html>

<head>
<title>TKFM Platform Launch Dashboard</title>
</head>

<body>

<h1>TKFM Platform Growth</h1>

<button onclick="load()">Load Metrics</button>

<pre id="data"></pre>

<script>

async function load(){

 const res = await fetch(
 "/.netlify/functions/api/platform-growth-engine"
 )

 const data = await res.json()

 document.getElementById("data").innerText =
 JSON.stringify(data,null,2)

}

</script>

</body>

</html>
