<!DOCTYPE html>
<html>

<head>
<title>TKFM Streaming Dashboard</title>
</head>

<body>

<h1>Streaming Oracle</h1>

<pre id="data"></pre>

<script>

async function load(){

 const res = await fetch(
 "/.netlify/functions/api/streaming-stats-ingest"
 )

 const data = await res.json()

 document.getElementById("data").innerText =
 JSON.stringify(data,null,2)

}

load()

</script>

</body>

</html>
