<!DOCTYPE html>
<html>
<head>

<title>Trending Music Assets</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
padding:40px;
}

.card{
background:#0f172a;
padding:20px;
margin-bottom:10px;
}

</style>

</head>

<body>

<h1>Trending Songs</h1>

<div id="songs"></div>

<script>

async function load(){

const res=await fetch("/.netlify/functions/catalog-market-data")
const data=await res.json()

const container=document.getElementById("songs")
container.innerHTML=""

for(const s of data.market || []){

const div=document.createElement("div")
div.className="card"

div.innerHTML="Song ID: "+s.catalog_id+"<br>Price: "+s.price

container.appendChild(div)

}

}

load()
setInterval(load,5000)

</script>

</body>
</html>
