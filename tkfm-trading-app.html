<!DOCTYPE html>
<html>
<head>

<title>TKFM Trading</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:40px;
}

.card{
background:#0f172a;
padding:20px;
margin-bottom:10px;
}

</style>

</head>

<body>

<h1>Music Trading App</h1>

<div id="market"></div>

<script>

async function load(){

const res=await fetch("/.netlify/functions/catalog-market-data")
const data=await res.json()

const el=document.getElementById("market")

for(const c of data.market || []){

const div=document.createElement("div")
div.className="card"

div.innerText=c.catalog_id+" price: "+c.price

el.appendChild(div)

}

}

load()

</script>

</body>
</html>
