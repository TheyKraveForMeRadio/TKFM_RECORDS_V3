<!DOCTYPE html>
<html>
<head>
<title>TKFM Song Trading</title>

<style>

body{
background:#020617;
color:#e5e7eb;
font-family:Arial;
padding:40px;
}

h1{
color:#facc15;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #1e293b;
}

</style>

</head>

<body>

<h1>SONG MARKET</h1>

<table>

<thead>
<tr>
<th>Song</th>
<th>Price</th>
<th>Supply</th>
</tr>
</thead>

<tbody id="tokenTable">

</tbody>

</table>

<script>

const source = new EventSource("/.netlify/functions/tkfm-market-terminal-engine")

source.onmessage = function(event){

const data = JSON.parse(event.data)

const table = document.getElementById("tokenTable")

table.innerHTML=""

for(const token of data.tokens){

const row=document.createElement("tr")

row.innerHTML=`
<td>${token.name}</td>
<td>${token.price}</td>
<td>${token.total_supply}</td>
`

table.appendChild(row)

}

}

</script>

</body>
</html>
