<!DOCTYPE html>
<html>

<head>

<title>TKFM Royalty Exchange</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>
<script src="/js/tkfm-wallet.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
}

button{
background:#a855f7;
border:none;
padding:10px;
color:white;
cursor:pointer;
}

.buy{
background:#22c55e;
}

.sell{
background:#ef4444;
}

.panel{
background:#0f172a;
padding:15px;
margin:10px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>TKFM Royalty Exchange</h1>

<button onclick="connectWallet()">Connect Wallet</button>

<div id="walletAddress"></div>

<div class="panel">

<h2>Trade Catalog Tokens</h2>

<input id="catalog" placeholder="Catalog ID">

<input id="amount" placeholder="Token Amount">

<button class="buy" onclick="buy()">BUY</button>

<button class="sell" onclick="sell()">SELL</button>

</div>

<canvas id="priceChart"></canvas>

<script>

const chartCtx=document.getElementById("priceChart");

let chart=new Chart(chartCtx,{
type:"line",
data:{
labels:[],
datasets:[{
label:"Catalog Price",
data:[],
borderColor:"#22d3ee"
}]
}
});

async function loadPrice(){

const res=await fetch("/.netlify/functions/live-token-price?catalog_id=1");

const data=await res.json();

chart.data.labels=data.map(d=>d.timestamp);

chart.data.datasets[0].data=data.map(d=>d.price);

chart.update();

}

async function buy(){

const catalog=document.getElementById("catalog").value;

const amount=document.getElementById("amount").value;

await fetch("/.netlify/functions/buy-token",{

method:"POST",

body:JSON.stringify({
catalog_id:catalog,
investor_id:window.userAddress,
amount
})

});

}

async function sell(){

const catalog=document.getElementById("catalog").value;

const amount=document.getElementById("amount").value;

await fetch("/.netlify/functions/sell-token",{

method:"POST",

body:JSON.stringify({
catalog_id:catalog,
investor_id:window.userAddress,
amount
})

});

}

loadPrice();

setInterval(loadPrice,10000);

</script>

</body>

</html>
