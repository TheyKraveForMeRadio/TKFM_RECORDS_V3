<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TKFM Records V3 — Owner Dashboard</title>
<link rel="stylesheet" href="/css/tkfm-records.css">

<!-- JS Engines & Panels -->
<script src="/js/tkfm-owner-credit-panel.js" defer></script>
<script src="/js/tkfm-ai-engines.js" defer></script>
<script src="/js/tkfm-distribution.js" defer></script>
<script src="/js/tkfm-owner-mix.js" defer></script>
</head>
<body>
<h1>TKFM Records — Owner Dashboard</h1>

<h2>Artist Management</h2>
<div id="ownerArtistList"></div>

<h2>Credit Injection Panel</h2>
<input type="text" id="creditEmail" placeholder="Artist Email">
<select id="creditType">
  <option value="ai_drops_25">AI Drops (25)</option>
  <option value="sponsor_read_20pack">Sponsor Read (20 Pack)</option>
</select>
<input type="number" id="creditAmount" placeholder="Amount">
<button id="addCreditBtn">Add Credits</button>

<h2>Radio Play Analytics</h2>
<div id="radioAnalytics"></div>

<script>
async function fetchArtists() {
  const res = await fetch('/.netlify/functions/api/use-credit', { method:'POST', body:JSON.stringify({ email:"" }) });
  const div = document.getElementById('ownerArtistList');
  div.innerHTML = "<pre>" + JSON.stringify(await res.json(), null, 2) + "</pre>";
}
fetchArtists();

// Credit injection
document.getElementById('addCreditBtn').addEventListener('click', async () => {
  const email = document.getElementById('creditEmail').value;
  const type = document.getElementById('creditType').value;
  const amount = parseInt(document.getElementById('creditAmount').value);
  if(!email || !type || !amount) return alert("All fields required");
  const res = await fetch('/.netlify/functions/api/add-credit', { 
    method:'POST', 
    body: JSON.stringify({ email, creditType:type, amount }) 
  });
  const data = await res.json();
  alert("Credits updated: "+JSON.stringify(data.credits));
  fetchArtists();
});

// Radio play analytics
async function renderRadioAnalytics() {
  const res = await fetch('/.netlify/functions/api/radio-play', { method:'POST', body: JSON.stringify({}) });
  const data = await res.json();
  const div = document.getElementById('radioAnalytics');
  div.innerHTML = "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
}
renderRadioAnalytics();

// Owner Mix Approvals
async function renderOwnerMix() {
  const db = await TKFM_OWNER_MIX.listSubmittedTracks();
  const div = document.createElement('div');
  for(const email in db){
    db[email].forEach((t,idx)=>{
      const btns = t.status==="submitted" ? 
        `<button onclick="TKFM_OWNER_MIX.approveTrack('${email}',${idx}).then(()=>{alert('Approved'); renderOwnerMix();})">Approve</button>
         <button onclick="TKFM_OWNER_MIX.requestChanges('${email}',${idx}).then(()=>{alert('Changes Requested'); renderOwnerMix();})">Request Changes</button>` : 
        `<span>Status: ${t.status}</span>`;
      div.innerHTML += `<div>${email} - ${t.trackName} ${btns}</div>`;
    });
  }
  document.body.appendChild(div);
}
renderOwnerMix();
</script>

</body>
</html>
