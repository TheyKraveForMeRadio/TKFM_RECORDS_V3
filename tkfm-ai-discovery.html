<!DOCTYPE html>
<html>

<head>
<title>TKFM AI Discovery Engine</title>
</head>

<body>

<h1>AI Music Discovery</h1>

<button onclick="load()">Run AI Analysis</button>

<pre id="results"></pre>

<script>

async function load(){

 const res = await fetch(
 "/.netlify/functions/ai-viral-predictor"
 )

 const data = await res.json()

 document.getElementById("results").innerText =
 JSON.stringify(data,null,2)

}

</script>

</body>
