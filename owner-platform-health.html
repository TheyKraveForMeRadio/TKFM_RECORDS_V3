<!DOCTYPE html>
<html>
<head>

<title>TKFM Platform Health</title>

<style>

body{
background:#020617;
color:white;
font-family:system-ui;
padding:40px;
}

h1{
color:#facc15;
}

.card{
background:#0f172a;
padding:20px;
border-radius:8px;
margin-bottom:10px;
}

.ok{
color:#22c55e;
}

.warn{
color:#f97316;
}

</style>

</head>

<body>

<h1>Platform Health Monitor</h1>

<div id="health"></div>

<script>

async function loadHealth(){

const res = await fetch("/.netlify/functions/platform-health-monitor")
const data = await res.json()

const container=document.getElementById("health")
container.innerHTML=""

data.checks.forEach(c=>{

const div=document.createElement("div")
div.className="card"

div.innerHTML="<strong>"+c.name+"</strong><br><span class='"+c.status+"'>"+c.message+"</span>"

container.appendChild(div)

})

}

loadHealth()
setInterval(loadHealth,5000)

</script>

</body>
</html>
