<!DOCTYPE html>
<html>

<head>
<title>TKFM Catalog Registry</title>
</head>

<body>

<h1>Catalog Registry</h1>

<button onclick="register()">Register Catalog</button>

<pre id="output"></pre>

<script>

async function register(){

 const res = await fetch("/.netlify/functions/catalog-registry",{
  method:"POST",
  body:JSON.stringify({
   title:"Example Track",
   artist:"TKFM Artist",
   owner_wallet:"0x123"
  })
 })

 const data = await res.json()

 document.getElementById("output").innerText =
 JSON.stringify(data,null,2)

}

</script>

</body>

</html>
