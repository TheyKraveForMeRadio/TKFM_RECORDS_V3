<!DOCTYPE html>
<html>
<head>
<title>TKFM Catalog Marketplace</title>
</head>

<body>

<h1>TKFM Catalog Marketplace</h1>

<div id="catalogs"></div>

<script>

async function loadCatalogs(){

 const res = await fetch("/.netlify/functions/catalogs-list")

 const catalogs = await res.json()

 const div = document.getElementById("catalogs")

 catalogs.forEach(c => {

  const el = document.createElement("div")

  el.innerHTML = `
  <h3>${c.track_title}</h3>
  <p>${c.artist_name}</p>
  <button onclick="buy('${c.id}')">Buy Shares</button>
  `

  div.appendChild(el)

 })

}

function buy(id){

 fetch("/.netlify/functions/investor-buy-catalog",{
  method:"POST",
  body:JSON.stringify({
   catalog_id:id,
   investor_id:"demo",
   shares:10
  })
 })

}

loadCatalogs()

</script>

</body>
</html>
