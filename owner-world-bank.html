<!DOCTYPE html>
<html>
<head>
  <title>TKFM World Bank Console</title>
</head>
<body>
<h1>🌍 TKFM — World Bank Integration</h1>

<button onclick="runReport()">Generate Global Report</button>
<pre id="report"></pre>

<h2>Central Treasury Control</h2>
<input id="amt" placeholder="Adjustment Amount (USD)">
<input id="reason" placeholder="Reason">
<button onclick="adjustTreasury()">Apply Adjustment</button>

<script>
async function runReport() {
  const r = await fetch('/.netlify/functions/api/world-bank-ledger');
  const d = await r.json();
  document.getElementById('report').textContent =
    JSON.stringify(d, null, 2);
}

async function adjustTreasury() {
  const amt = document.getElementById('amt').value;
  const reason = document.getElementById('reason').value;
  await fetch('/.netlify/functions/api/central-treasury', {
    method: 'POST',
    body: JSON.stringify({ adjustment: amt, reason })
  });
  alert('Treasury Updated');
}
</script>

</body>
</html>
