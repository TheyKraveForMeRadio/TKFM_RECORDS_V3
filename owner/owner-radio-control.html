<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TKFM Owner — Radio Control</title>
<script src="/js/tkfm-radio-rotation-engine.js"></script>
</head>

<body data-tkfm-theme="records">

<h2>Radio Rotation Control</h2>
<div id="list"></div>

<script>
TKFM_RADIO.all().forEach(t => {
  const d = document.createElement("div");
  d.innerHTML = `
    <b>${t.title}</b><br>
    ${t.artistEmail}<br>
    Tier: ${t.tier}<br>
    Spins: ${t.spins}<br>
    Active: ${t.active}<br>
    <button onclick="disable('${t.id}')">Disable</button>
    <hr>
  `;
  list.appendChild(d);
});

function disable(id){
  const list = TKFM_RADIO.all().map(t =>
    t.id === id ? { ...t, active:false } : t
  );
  localStorage.setItem("tkfm_radio_rotation", JSON.stringify(list));
  location.reload();
}
</script>

</body>
</html>
